<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Amazon Affiliate Link Converter</title>
  <script>
    // Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    // This script takes the current url and converts the path and query
    // string into just a query string, and then redirects the browser
    // to the new url with only a query string and hash fragment
    
    // If the current URL contains a base path, we need to handle that correctly
    var pathSegmentsToKeep = 0; // Default for custom domain
    var repoName = 'affiliate-link';
    
    // Check if we're on GitHub Pages but not on a custom domain
    if (window.location.hostname.indexOf('github.io') !== -1) {
      pathSegmentsToKeep = 1; // Keep the repo name segment for GitHub Pages
    }

    var l = window.location;
    var newUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '');
    var path = l.pathname.split('/');
    for (var i = 0; i < pathSegmentsToKeep + 1; i++) {
      if (path[i] !== '') {
        newUrl += '/' + path[i];
      }
    }
    
    newUrl += '/?/' + path.slice(pathSegmentsToKeep + 1).join('/') + 
      (l.search ? '&' + l.search.slice(1) : '') + l.hash;

    // Log the redirection process (for debugging)
    console.log('Original URL:', l.href);
    console.log('Redirecting to:', newUrl);
    
    window.location.replace(newUrl);
  </script>
</head>
<body>
  <h1>Redirecting...</h1>
  <p>If you are not redirected automatically, please click <a id="redirect-link" href="/">here</a>.</p>
  <script>
    // Update the fallback link with the correct redirect URL
    document.getElementById('redirect-link').href = window.location.protocol + '//' + 
      window.location.hostname + (window.location.port ? ':' + window.location.port : '') + '/';
  </script>
</body>
</html>
