name: Deploy to GitHub Pages

on:
  push:
    branches:
      - deploy-002
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write
  deployments: write

# Allow only one concurrent deployment
concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    # This environment uses GitHub Pages deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Wait a moment to ensure no other deployments are running
      - name: Wait for other deployments
        run: sleep 5

      # Attempt to delete automatic gh-pages branch to force our custom deployment
      - name: Delete gh-pages branch if it exists
        run: |
          git fetch origin
          if git ls-remote --heads origin gh-pages | grep -q 'gh-pages'; then
            git push origin --delete gh-pages || true
            echo "Removed gh-pages branch to avoid conflicts"
          else
            echo "No gh-pages branch found to delete"
          fi
        continue-on-error: true

      # Create .nojekyll file in the repo root
      - name: Create .nojekyll file
        run: touch .nojekyll

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # Add a step to ensure the build contains critical files
      - name: Verify build output
        run: |
          echo "Verifying build output contains all critical files..."
          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: dist/index.html is missing!"
            exit 1
          fi
          if [ ! -f "dist/.nojekyll" ]; then
            echo "Creating .nojekyll in dist directory"
            touch dist/.nojekyll
          fi
          if [ ! -f "dist/CNAME" ]; then
            echo "Creating CNAME in dist directory"
            echo "syrez.co.in" > dist/CNAME
          fi
        
      - name: Create a dummy deployment marker
        run: |
          echo "Marking repository as having a custom Pages deployment..."
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Create and commit a file to mark custom deployment
          mkdir -p .github
          echo "This site uses a custom deployment process. See .github/workflows/deploy.yml" > .github/.custom-pages-deploy
          git add .github/.custom-pages-deploy
          
          # Commit but don't push - we just need this for the deploy action
          git commit -m "Add custom deployment marker" || true
        continue-on-error: true

      - name: List build directory contents
        run: |
          echo "Contents of dist directory:"
          ls -la dist
          echo "Contents of dist/icons directory (if exists):"
          ls -la dist/icons || echo "No icons directory found"

      # Deploy to gh-pages branch using the JamesIves action
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        id: deployment
        with:
          folder: dist
          branch: gh-pages
          clean: true
          commit-message: "Deploy via custom workflow: ${{ github.event.head_commit.message || 'Manual deployment' }}"
          git-config-name: GitHub Actions
          git-config-email: github-actions@github.com
          token: ${{ secrets.GITHUB_TOKEN }}
          force: true

      # Add a delay to allow GitHub to process the deployment
      - name: Wait for GitHub Pages to process deployment
        run: sleep 10
        
      # Verify deployment
      - name: Verify deployment
        run: |
          echo "Deployment completed. GitHub Pages should now be serving content from the gh-pages branch."
          echo "If you're still experiencing issues with automatic deployments, please manually run the 'Prevent Automatic Pages Deployment' workflow."
