name: Deploy to GitHub Pages

on:
  push:
    branches:
      - deploy-001  # Changed to match your current branch
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Cancel any in-progress job or run
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Skip if triggered by GitHub Pages
    if: ${{ !contains(github.event.head_commit.message, '[pages build]') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build -- --noEmit

      - name: Build project
        run: npm run build

      - name: Create .nojekyll file
        run: touch dist/.nojekyll

      - name: Verify output files
        run: |
          echo "Checking contents of dist folder:"
          ls -la dist/
          echo "Checking for icon files:"
          ls -la dist/icons/ || echo "No icons directory found"
          echo "Checking for manifest.json:"
          cat dist/manifest.json || echo "No manifest.json found"
          echo "Checking for 404.html:"
          cat dist/404.html || echo "No 404.html found"
          echo "Checking for CNAME:"
          cat dist/CNAME || echo "No CNAME found"

      - name: Copy CNAME file if not exists
        run: |
          if [ ! -f "dist/CNAME" ]; then
            echo "syrez.co.in" > dist/CNAME
            echo "Created CNAME file with syrez.co.in in dist/"
          else
            echo "CNAME file already exists in dist/"
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist  # The folder the action should deploy
          branch: gh-pages  # The branch the action should deploy to
          clean: true  # Automatically remove deleted files from the deploy branch
          commit-message: "Deploy: ${{ github.event.head_commit.message || 'Manual deployment' }} [pages build]"
