name: Deploy to GitHub Pages

on:
  push:
    branches:
      - deploy-002  # Changed to use the new deploy-002 branch
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Try to disable the automatic GitHub Pages deployment
      - name: Disable automatic GitHub Pages deployment
        run: |
          echo "Attempting to disable automatic GitHub Pages deployment..."
          curl -X DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pages"
        continue-on-error: true

      # Attempt to delete gh-pages branch to avoid conflicts with the automatic deployment
      - name: Delete gh-pages branch if it exists
        run: |
          git fetch origin
          if git ls-remote --heads origin gh-pages | grep -q 'gh-pages'; then
            git push origin --delete gh-pages || true
            echo "Removed gh-pages branch to avoid conflicts"
          else
            echo "No gh-pages branch found to delete"
          fi
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Dump build directory structure
        run: |
          echo "Contents of dist directory:"
          ls -la dist
          echo "Contents of dist/icons directory:"
          ls -la dist/icons || echo "No icons directory found"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        id: deployment
        with:
          folder: dist
          branch: gh-pages
          clean: true
          commit-message: "Deploy: ${{ github.event.head_commit.message || 'Manual deployment' }}"

      # Configure GitHub Pages (must run after deployment since we need the gh-pages branch to exist)
      - name: Delay before configuring GitHub Pages
        run: sleep 5

      - name: Configure GitHub Pages
        run: |
          echo "Setting GitHub Pages to use gh-pages branch..."
          curl -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"source": {"branch": "gh-pages", "path": "/"}}'
        continue-on-error: true
