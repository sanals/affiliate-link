name: Prevent Automatic Pages Deployment

on:
  # Run on all pushes to main or when manually triggered
  push:
    branches:
      - main
  # Run on schedule (every 6 hours)
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# We don't want this running at the same time as our primary deployment
concurrency:
  group: "prevent-auto-pages"
  cancel-in-progress: false

jobs:
  prevent-auto-deployment:
    runs-on: ubuntu-latest
    # Skip this job if we're on the deployment branch
    if: ${{ !contains(github.ref, 'deploy-002') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch complete history
      
      # Create .nojekyll file in the root to prevent Jekyll processing
      - name: Create .nojekyll file
        run: |
          touch .nojekyll
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .nojekyll
          git commit -m "Add .nojekyll file to prevent default Pages processing" || echo "No changes to commit"
          git push || echo "Could not push .nojekyll file"
        continue-on-error: true
      
      # Force-create an empty gh-pages branch to prevent GitHub from auto-building
      - name: Create empty gh-pages branch
        run: |
          # Try to delete an existing gh-pages branch first
          git push origin --delete gh-pages || echo "No gh-pages branch to delete"
          
          # Create an empty orphan branch
          git checkout --orphan empty-gh-pages
          git rm -rf .
          touch README.md
          echo "# Custom Deployment" > README.md
          echo "This branch is intentionally kept empty." >> README.md
          echo "The site is deployed via a custom GitHub Action workflow." >> README.md
          echo "See the deploy-002 branch for the source code." >> README.md
          touch .nojekyll  # Prevent Jekyll processing
          
          # Add, commit, and push the empty branch
          git add README.md .nojekyll
          git commit -m "Create empty gh-pages branch to prevent automatic deployment"
          git push -f origin empty-gh-pages:gh-pages || echo "Could not push empty gh-pages branch"
        continue-on-error: true
      
      # Adding an additional step to reinforce deployment blockers
      - name: Verify GitHub Pages settings
        run: |
          echo "Creating additional files to block automatic deployments..."
          # Create a .github/workflows/.lock-pages file
          mkdir -p .github/workflows
          echo "DO NOT DELETE - This file prevents automatic GitHub Pages deployments" > .github/workflows/.lock-pages
          git add .github/workflows/.lock-pages
          git commit -m "Add lock file to prevent automatic Pages deployment" || echo "No changes to commit"
          git push || echo "Could not push lock file"
        continue-on-error: true
      
      # Restore the original branch
      - name: Restore original branch
        run: |
          git checkout ${{ github.ref_name }} || git checkout main
        continue-on-error: true 